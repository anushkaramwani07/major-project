<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <title>Movie Picker</title>
</head>

<body>
    <header class="site-header">
        <a href="index.html" class="logo">Movie Picker</a>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="spin.html">Spin the wheel</a>

            <div class="manual-picker">
                <select id="genre-selection" class="nav-dropdown">
                    <option value="">Pick Manually</option>
                    <option value="ACTION">ACTION</option>
                    <option value="COMEDY">COMEDY</option>
                    <option value="HORROR">HORROR</option>
                    <option value="CRIME">CRIME</option>
                    <option value="DRAMA">DRAMA</option>
                    <option value="ROMANCE">ROMANCE</option>
                    <option value="SCIENCE FICTION">SCIENCE FICTION</option>
                    <option value="MYSTERY">MYSTERY</option>
                    <option value="ADVENTURE">ADVENTURE</option>
                    <option value="ANIMATION">ANIMATION</option>
                    <option value="FANTASY">FANTASY</option>
                </select>

                <p id="manual-result"></p>
            </div>
        </nav>
    </header>

    <section class="movie-results-selection">
        <h2 id="selected-genre-title"></h2>
        <div id="movie-list" class="movie-grid">
        </div>
    </section>

</body>

</html>
