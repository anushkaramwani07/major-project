<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Movie Picker</title>
</head>

<body>
    <header class="site-header">
        <a href="index.html" class="logo">Movie Picker</a>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="spin.html">Spin the wheel</a>
            
            <div class="manual-picker">
                <select id="genre-selection" class="nav-dropdown">
                    <option value="">Pick Manually</option>
                    <option value="ACTION">ACTION</option>
                    <option value="COMEDY">COMEDY</option>
                    <option value="HORROR">HORROR</option>
                    <option value="CRIME">CRIME</option>
                    <option value="DRAMA">DRAMA</option>
                    <option value="ROMANCE">ROMANCE</option>
                    <option value="SCIENCE FICTION">SCIENCE FICTION</option>
                    <option value="MYSTERY">MYSTERY</option>
                    <option value="ADVENTURE">ADVENTURE</option>
                    <option value="ANIMATION">ANIMATION</option>
                    <option value="FANTASY">FANTASY</option>
                </select>

                <p id="manual-result"></p>
            </div>
        </nav>
    </header>


    <fieldset class="ui-wheel-of-fortune">
        <ul>
            <li>ACTION</li>
            <li>COMEDY</li>
            <li>HORROR</li>
            <li>CRIME</li>
            <li>DRAMA</li>
            <li>ROMANCE</li>
            <li>SCIENCE FICTION</li>
            <li>MYSTERY</li>
            <li>CRIME</li>
            <li>ADVENTURE</li>
            <li>ANIMATION</li>
            <li>FANTASY</li>
        </ul>
        <button type="button">SPIN</button>
    </fieldset>

    <p id="result"></p>

<!-- keep this in here cause all the HTML elements would be loaded by this time! -->
    <script src="scripts.js"></script>
</body>

</html>
